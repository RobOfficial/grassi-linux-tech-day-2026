services:
  app:
    build: .
    container_name: grassi-tech-quest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: file:/app/data/techquest.db
      RUN_SEED: "1"
    volumes:
      - techquest-data:/app/data
    ports:
      - "127.0.0.1:3000:3000"
    # Esempio opzionale caddy-docker-proxy labels (commentato):
    # labels:
    #   caddy: techday.itisgrassi.it
    #   caddy.handle_path: /quest/*
    #   caddy.handle_path.reverse_proxy: "{{upstreams 3000}}"

volumes:
  techquest-data:
