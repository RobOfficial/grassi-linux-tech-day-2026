services:
  app:
    build: .
    container_name: grassi-tech-quest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: file:/app/data/techquest.db
      RUN_SEED: "1"
    volumes:
      - techquest-data:/app/data
    networks:
      - proxy

volumes:
  techquest-data:

networks:
  proxy:
    external: true
    name: reverse-proxy_proxy_net